syntax = "proto3";
package merutable.cluster;

// --- Field value types (mirrors merutable::FieldValue) ---

message FieldValue {
    oneof value {
        bool boolean = 1;
        int32 int32 = 2;
        int64 int64 = 3;
        float float_val = 4;
        double double_val = 5;
        bytes byte_array = 6;
    }
}

message Row {
    // Parallel to TableSchema.columns. Empty = NULL.
    repeated OptionalFieldValue fields = 1;
}

message OptionalFieldValue {
    bool is_null = 1;
    FieldValue value = 2;
}

// --- Schema types (mirrors merutable::TableSchema) ---

enum ColumnType {
    COLUMN_TYPE_UNSPECIFIED = 0;
    BOOLEAN = 1;
    INT32 = 2;
    INT64 = 3;
    FLOAT = 4;
    DOUBLE = 5;
    BYTE_ARRAY = 6;
    FIXED_LEN_BYTE_ARRAY = 7;
}

message ColumnDef {
    string name = 1;
    ColumnType col_type = 2;
    bool nullable = 3;
    optional uint32 field_id = 4;
    optional FieldValue initial_default = 5;
    optional FieldValue write_default = 6;
    // For FIXED_LEN_BYTE_ARRAY only
    int32 fixed_len = 7;
}

message TableSchema {
    string table_name = 1;
    repeated ColumnDef columns = 2;
    repeated uint32 primary_key = 3;
    uint32 schema_id = 4;
    uint32 last_column_id = 5;
}

// --- Client-facing cluster service ---

message ResponseMeta {
    string leader_addr = 1;
    uint64 leader_token = 2;
    uint64 raft_term = 3;
}

message PutRequest {
    string table = 1;
    Row row = 2;
}

message PutResponse {
    uint64 seq = 1;
    uint64 raft_index = 2;
    ResponseMeta meta = 3;
}

message DeleteRequest {
    string table = 1;
    repeated FieldValue pk_values = 2;
}

message DeleteResponse {
    uint64 seq = 1;
    uint64 raft_index = 2;
    ResponseMeta meta = 3;
}

message GetRequest {
    string table = 1;
    repeated FieldValue pk_values = 2;
    // Optional: wait until follower has applied at least this index
    uint64 min_raft_index = 3;
}

message GetResponse {
    bool found = 1;
    Row row = 2;
    uint64 applied_index = 3;
    ResponseMeta meta = 4;
}

message ScanRequest {
    string table = 1;
    repeated FieldValue start_pk = 2;
    repeated FieldValue end_pk = 3;
}

message ScanResponse {
    repeated Row rows = 1;
    ResponseMeta meta = 2;
}

// --- Table management ---

message CreateTableRequest {
    string name = 1;
    TableSchema schema = 2;
}

message CreateTableResponse {
    ResponseMeta meta = 1;
}

message DropTableRequest {
    string name = 1;
}

message DropTableResponse {
    ResponseMeta meta = 1;
}

message AlterTableRequest {
    string table = 1;
    oneof change {
        ColumnDef add_column = 2;
    }
}

message AlterTableResponse {
    TableSchema new_schema = 1;
    ResponseMeta meta = 2;
}

message ListTablesRequest {}

message ListTablesResponse {
    repeated TableSchema tables = 1;
    ResponseMeta meta = 2;
}

// --- Cluster status ---

message Empty {}

message NodeStatus {
    uint64 node_id = 1;
    string address = 2;
    string az = 3;
    bool is_healthy = 4;
    uint32 table_count = 5;
    map<string, TableRoleInfo> tables = 6;
}

message TableRoleInfo {
    string role = 1;           // "leader" or "follower"
    uint64 committed_index = 2;
    uint64 applied_index = 3;
    uint64 raft_term = 4;
}

// --- Leader watch ---

message WatchLeaderRequest {
    // Empty: watch all tables. Populated: watch specific tables.
    repeated string tables = 1;
}

message LeaderEvent {
    string table = 1;
    string leader_addr = 2;
    uint64 leader_node_id = 3;
    uint64 raft_term = 4;
}

// --- The service ---

service MeruCluster {
    // Data operations
    rpc Put(PutRequest) returns (PutResponse);
    rpc Delete(DeleteRequest) returns (DeleteResponse);
    rpc Get(GetRequest) returns (GetResponse);
    rpc Scan(ScanRequest) returns (ScanResponse);

    // Table management
    rpc CreateTable(CreateTableRequest) returns (CreateTableResponse);
    rpc DropTable(DropTableRequest) returns (DropTableResponse);
    rpc AlterTable(AlterTableRequest) returns (AlterTableResponse);
    rpc ListTables(ListTablesRequest) returns (ListTablesResponse);

    // Cluster
    rpc GetStatus(Empty) returns (NodeStatus);
    rpc WatchLeader(WatchLeaderRequest) returns (stream LeaderEvent);
}
